name: generate-snake-game-from-github-contribution-grid

  uses: Platane/snk@v2

  with: 
    github_user_name: 'iTanken'

  outputs: |
    dist/snake-game-dark.svg?palette=github-dark&color_snake=blue
    dist/snake-game-light.svg?color_snake=#7845ab
    dist/snake-game-ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
